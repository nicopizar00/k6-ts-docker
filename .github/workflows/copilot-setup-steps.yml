name: Copilot — Setup Steps

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare report directories
        run: |
          mkdir -p reports/state reports/logs
          chmod -R 777 reports || true

      - name: Build images (esbuild inside builder stage)
        run: docker compose build --parallel

      - name: Smoke run (verify services)
        run: |
          docker compose up -d --wait gateway-api
          docker compose run --rm k6 run /scripts/smoke.js || true

      - name: Tear down
        run: docker compose down --volumes --remove-orphans
